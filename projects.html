<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — William Wei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="mark">William<span>.</span></a>
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="about.html">About</a>
  </nav>
</header>

<div class="waypoint" style="margin-top: 4.5rem;">
  <span class="index">/ALL</span>
  <h1>Projects</h1>
  <span class="descriptor">click a thumbnail for details</span>
</div>

<!-- Cards are generated automatically from projects-data.js — nothing to edit here. -->
<div class="featured-grid" style="margin-top: 0;" id="projects-grid"></div>

<footer class="site-footer" style="margin-top: 3.5rem;">
  <div class="contact-links">
    <a href="mailto:youremail@example.com">Email</a>
    <a href="https://www.instagram.com/w_y.wei/">Instagram</a>
    <a href="#">ArtStation</a>
    <a href="#">LinkedIn</a>
  </div>
  <div class="copy">© 2026 William Wei. Built for portfolio use.</div>
</footer>

<script src="projects-data.js"></script>
<script>
  // Build one card per project automatically.
  const grid = document.getElementById('projects-grid');
  if (grid && typeof PROJECTS !== 'undefined') {
    grid.innerHTML = PROJECTS.map((p) => `
      <a href="project.html?id=${p.id}" class="featured-card">
        <img src="${p.cover}" alt="${p.name}"
             onerror="this.outerHTML='<div class=\\'placeholder-art\\'><span class=\\'slot-no\\'>${p.id}</span><span>Add thumbnail</span></div>'">
        <div class="card-caption">
          <span class="proj-name">${p.name}</span>
          <span class="proj-role">${p.role}</span>
        </div>
      </a>
    `).join('');
  }
</script>
<script src="script.js"></script>
</body>
</html>
