<script src="projects-data.js"></script>
<script>
  // Show the first 3 projects from the master list as "Featured."
  // To feature different projects, just reorder PROJECTS in projects-data.js.
  const featuredGrid = document.getElementById('featured-grid');
  if (featuredGrid && typeof PROJECTS !== 'undefined') {
    featuredGrid.innerHTML = PROJECTS.slice(0, 3).map((p) => `
      <a href="project.html?id=${p.id}" class="featured-card">
        <img src="${p.cover}" alt="${p.name}"
             onerror="this.outerHTML='<div class=\\'placeholder-art\\'><span class=\\'slot-no\\'>${p.id}</span><span>Add thumbnail</span></div>'">
        <div class="card-caption">
          <span class="proj-name">${p.name}</span>
          <span class="proj-role">${p.role}</span>
        </div>
      </a>
    `).join('');
  }
</script>
